<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Metronome Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Noto+Sans+JP:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="metronome.css">
    <link rel="stylesheet" href="../splash.css">
</head>

<body>
    <!-- FUI Splash (tap to close) - metronome 起動時のみ -->
    <div id="fui-splash" class="fui-splash" role="button" aria-label="スプラッシュを閉じる" tabindex="0">
        <div class="fui-scanline"></div>
        <div class="fui-grid"></div>
        <div class="fui-vignette"></div>
        <div class="fui-frame">
            <span class="fui-corner fui-corner-tl"></span>
            <span class="fui-corner fui-corner-tr"></span>
            <span class="fui-corner fui-corner-bl"></span>
            <span class="fui-corner fui-corner-br"></span>
        </div>
        <div class="fui-center">
            <div class="fui-phase active" id="fui-phase-welcome">
                <div class="fui-welcome fui-font-en">Welcome to</div>
            </div>
            <div class="fui-phase" id="fui-phase-typewriter">
                <div class="fui-typewriter-wrap fui-font-en">
                    <span id="fui-typed-text"></span>
                    <span class="fui-cursor" id="fui-cursor"></span>
                </div>
            </div>
            <div class="fui-phase" id="fui-phase-acronym">
                <div class="fui-acronym-phase" id="fui-acronym-box">
                    <div class="fui-acronym-lower fui-font-en">kumamoto simin music</div>
                    <div class="fui-acronym-upper fui-font-en">KUMAMOTO SIMIN MUSIC</div>
                </div>
            </div>
            <div class="fui-loading-indicator fui-font-en" id="fui-loading">Now Loading...</div>
            <div class="fui-phase" id="fui-phase-final">
                <div class="fui-sub fui-sub-jp">熊本市民吹奏楽団</div>
                <div class="fui-line"></div>
                <div class="fui-acronym fui-font-en">KUMAMOTO SISUI</div>
                <div class="fui-line"></div>
                <div class="fui-desc fui-font-en">Kumamoto City Wind Orchestra</div>
                <div class="fui-desc fui-font-en">This system made by HoloMoto</div>
                <div class="fui-tap fui-font-en">TAP TO START</div>
            </div>
        </div>
    </div>

    <div class="app-background"></div>
    <div class="glass-container">
        <div class="mt-frame" aria-hidden="true">
            <span class="mt-corner mt-corner-tl"></span>
            <span class="mt-corner mt-corner-tr"></span>
            <span class="mt-corner mt-corner-bl"></span>
            <span class="mt-corner mt-corner-br"></span>
        </div>
        <header>
            <h1 class="mt-fui-en">Metronome</h1>
            <div class="mode-switch">
                <button id="mode-simple" class="active mt-fui-en">Simple</button>
                <button id="mode-sequence" class="mt-fui-en">Sequence</button>
            </div>
        </header>

        <main>
            <!-- Visual Display (FUI: モニター風エリア) -->
            <div class="visualizer mt-visualizer-frame">
                <div class="beat-indicator" id="beat-visual"></div>
                <div class="beat-counter" id="beat-counter">1</div>
                <canvas id="conductor-canvas" width="300" height="200"></canvas>
                <!-- Sequence Mode: Bar Progress (visible when playing) -->
                <div class="seq-progress-overlay hidden" id="seq-progress-overlay">
                    <div class="seq-progress-info">
                        <span class="seq-step-label mt-fui-en">Step <span id="seq-vis-step">1</span><span id="seq-vis-practice" class="seq-practice-label"></span> / <span id="seq-vis-total-steps">1</span></span>
                        <span class="seq-bar-label">小節 <span id="seq-vis-bar">1</span> / <span id="seq-vis-total-bars">4</span></span>
                    </div>
                    <div class="seq-progress-bar-wrap">
                        <div class="seq-progress-bar" id="seq-progress-bar"></div>
                    </div>
                </div>
            </div>

            <!-- 倍テンポ（Simple / Sequence 共通で常に表示・有効） -->
            <div class="tempo-mult-row tempo-mult-shared">
                <label>倍テンポ</label>
                <div class="tempo-mult-btns">
                    <button type="button" class="tempo-mult-btn" data-mult="0.5">1/2×</button>
                    <button type="button" class="tempo-mult-btn active" data-mult="1">1×</button>
                    <button type="button" class="tempo-mult-btn" data-mult="2">2×</button>
                </div>
            </div>

            <!-- Main Controls (Simple Mode) -->
            <div id="simple-controls" class="controls-section">
                <!-- Volume Control -->
                <div class="control-row volume-control">
                    <label class="mt-fui-en">Vol</label>
                    <input type="range" id="volume-slider" min="0" max="300" value="200">
                </div>

                <div class="tempo-display">
                    <button class="tempo-adjust" id="tempo-minus">-</button>
                    <div class="tempo-value">
                        <span id="bpm-display">120</span>
                        <span class="bpm-label mt-fui-en">BPM</span>
                        <span class="tempo-mult-label" id="tempo-mult-label"></span>
                    </div>
                    <button class="tempo-adjust" id="tempo-plus">+</button>
                </div>

                <input type="range" id="bpm-slider" min="30" max="300" value="120">

                <div class="settings-grid">
                    <div class="setting-item">
                        <label class="mt-fui-en">Time Sig</label>
                        <select id="time-signature">
                            <option value="4/4" selected>4/4</option>
                            <option value="3/4">3/4</option>
                            <option value="2/4">2/4</option>
                            <option value="2/2">2/2</option>
                            <option value="1/4">1/4</option>
                            <option value="5/4">5/4</option>
                            <option value="6/8">6/8</option>
                            <option value="5/8">5/8</option>
                            <option value="9/8-2223">9/8 (2+2+2+3)</option>
                            <option value="9/8-2322">9/8 (2+3+2+2)</option>
                            <option value="6/8+3/4">6/8 + 3/4</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label class="mt-fui-en">Pre-count Loops</label>
                        <div class="input-row">
                            <input type="number" id="precount-bars" value="0" min="0" max="9" class="small-input">
                            <span class="unit mt-fui-en">Bars</span>
                        </div>
                    </div>
                    <div class="setting-item">
                        <label class="mt-fui-en">Display</label>
                        <div class="input-row" style="margin-top: 8px;">
                            <label class="mt-fui-en"
                                style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text-secondary); font-size: 0.9rem;">
                                <input type="checkbox" id="focus-mode-toggle"> Auto-Focus
                            </label>
                        </div>
                    </div>
                </div>

                <div class="sound-section">
                    <label class="sound-section-label">音のカスタマイズ</label>
                    <div class="sound-preset-row">
                        <label>音色</label>
                        <select id="sound-preset">
                            <option value="default">デフォルト</option>
                            <option value="soft">ソフト</option>
                            <option value="bright">明るい</option>
                            <option value="low">低め</option>
                        </select>
                    </div>
                    <div class="sound-detail-row">
                        <div class="sound-detail-item">
                            <label>波形</label>
                            <select id="sound-wave">
                                <option value="triangle">三角波</option>
                                <option value="sine">サイン波</option>
                                <option value="square">矩形波</option>
                                <option value="sawtooth">のこぎり波</option>
                            </select>
                        </div>
                        <div class="sound-detail-item">
                            <label>強拍 (Hz)</label>
                            <input type="number" id="sound-freq-downbeat" min="200" max="2000" value="1200" class="small-input">
                        </div>
                        <div class="sound-detail-item">
                            <label>弱拍 (Hz)</label>
                            <input type="number" id="sound-freq-beat" min="200" max="2000" value="800" class="small-input">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Sequence Editor (Sequence Mode) -->
            <div id="sequence-controls" class="controls-section hidden">
                <div class="template-row">
                    <label class="mt-fui-en">Template</label>
                    <select id="template-select">
                        <option value="">— 選択 —</option>
                        <option value="templateA">templateA</option>
                        <option value="templateB">templateB</option>
                    </select>
                    <button type="button" id="load-template-btn" class="secondary-btn small mt-fui-en">Load</button>
                </div>
                <div class="sequence-list" id="sequence-list">
                    <!-- practice-group 単位でブロックを格納。各グループは練習番号ごと -->
                    <div class="empty-state">No steps added yet.</div>
                </div>
                <div class="sequence-add-btns">
                    <button id="add-group-btn" class="secondary-btn small mt-fui-en">+ グループ</button>
                    <button id="add-step-btn" class="secondary-btn mt-fui-en">+ ブロック</button>
                </div>

                <div class="sequence-options">
                    <label class="mt-fui-en">
                        <input type="checkbox" id="sequence-loop"> Loop Sequence
                    </label>
                </div>

                <div class="current-step-display mt-fui-en" id="seq-status" style="display:none;">
                    Step <span id="seq-current-step">1</span><span id="seq-current-practice" class="seq-practice-label"></span> · 小節 <span id="seq-current-bar">1</span>/<span
                        id="seq-total-bars">4</span>
                </div>
            </div>

            <!-- Play Button -->
            <div class="action-area">
                <button id="play-btn" class="play-btn">
                    <div class="icon-play"></div>
                </button>
            </div>
        </main>
    </div>

    <template id="practice-group-template">
        <div class="practice-group">
            <div class="practice-group-header">
                <span class="group-label mt-fui-en">練習番号</span>
                <input type="text" class="group-practice-no" placeholder="A, 1など" maxlength="12" title="練習番号">
                <button type="button" class="add-block-btn" title="ブロック追加">+</button>
                <button type="button" class="remove-group" title="グループ削除">×</button>
            </div>
            <div class="practice-group-blocks"></div>
        </div>
    </template>
    <template id="step-template">
        <div class="sequence-step" data-step-index="0">
            <div class="step-header">
                <span class="step-number">#1</span>
                <select class="step-type-select">
                    <option value="normal">Normal</option>
                    <option value="fermata">Fermata (Wait)</option>
                </select>
                <button type="button" class="start-from-here-btn" title="その場所から練習">▶</button>
                <button class="remove-step">×</button>
            </div>

            <!-- Type: Normal -->
            <div class="step-controls type-normal">
                <div class="input-group">
                    <label>BPM</label>
                    <input type="number" class="step-bpm-start" value="120" min="30" max="300">
                </div>

                <div class="input-group full-width ramp-toggle-row">
                    <label class="checkbox-label">
                        <input type="checkbox" class="step-ramp-toggle"> Ramp to End BPM?
                    </label>
                </div>

                <div class="input-group ramp-end-group" style="display:none;">
                    <label>End BPM</label>
                    <input type="number" class="step-bpm-end" value="120" min="30" max="300">
                </div>

                <div class="input-group">
                    <label>Sig</label>
                    <select class="step-signature">
                        <option value="4/4">4/4</option>
                        <option value="3/4">3/4</option>
                        <option value="2/4">2/4</option>
                        <option value="2/2">2/2</option>
                        <option value="1/4">1/4</option>
                        <option value="5/4">5/4</option>
                        <option value="6/8">6/8</option>
                        <option value="5/8">5/8</option>
                        <option value="9/8-2223">9/8 (2+2+2+3)</option>
                        <option value="9/8-2322">9/8 (2+3+2+2)</option>
                        <option value="6/8+3/4">6/8 + 3/4</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Bars</label>
                    <input type="number" class="step-bars" value="4" min="1" max="100">
                </div>
            </div>

            <!-- Type: Fermata -->
            <div class="step-controls type-fermata" style="display:none;">
                <div class="input-group full-width">
                    <label>Duration (Seconds)</label>
                    <input type="number" class="step-duration" value="2.0" step="0.5" min="0.5" max="10.0">
                </div>
            </div>
        </div>
    </template>

    <script src="../splash.js"></script>
    <script src="metronome.js"></script>
</body>

</html>
